name: Run tests

on: 
  push:
    branches:
      - main
  pull_request:

jobs:
  run-tests:
    name: python
    strategy:
      matrix:
        python-version: [ "3.11" ]
        os: [ ubuntu-latest ]
      fail-fast: false
    runs-on: ${{ matrix.os }}


    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest tests
